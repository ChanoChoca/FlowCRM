spring:
  profiles:
    active: dev
  application:
    name: flashpage
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: America/Argentina/Buenos_Aires
  jackson:
    time-zone: America/Argentina/Buenos_Aires
    date-format: yyyy-MM-dd'T'HH:mm:ss
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

plaza:
  catalogos:
    cron: 0 0 3 * * * # Cada día a las 3:00 AM

desafios:
  cron: "0 59 23 * * *" # Cada día a las 11:59 PM

jwt:
  secret: ${JWT_SECRET}
  expirationHours: 2

n8n:
  url: ${N8N_URL}
  secret: ${N8N_SECRET}

google:
  oauth2:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
