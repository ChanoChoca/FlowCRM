spring:
  datasource:
    url: jdbc:mysql://mysql.default.svc.cluster.local:3306/crm?createDatabaseIfNotExist=true
    username: root
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

external:
  crm:
    base-url: ${EXTERNAL_CRM_BASE_URL}

frontend:
  url: "https://example.com"

google:
  oauth2:
    redirect-uri: "https://api.example.com/api/auth/callback/google"

cookie:
  secure: true
  domain: example.com
  sameSite: None
